services:
  db:
    image: mysql:8.0
    container_name: myadmin_mysql_dev
    restart: always
    environment:
      MYSQL_DATABASE: myadmin_db
      MYSQL_USER: myadmin_user
      MYSQL_PASSWORD: myadmin_password
      MYSQL_ROOT_PASSWORD: root_secure_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_dev_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "myadmin_user", "-pmyadmin_password"]
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      network: host
    container_name: myadmin_api_dev
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      # We take the host's key and mount it invisibly in the container
      # The :ro means "Read-Only" to prevent the container from modifying or deleting the real keys.
      #- ${SSH_PRIVATE_KEY_PATH}:/app/secrets/id_rsa:ro
      #- ${SSH_KNOWN_HOSTS_PATH}:/app/secrets/known_hosts:ro
    environment:
      - ENV=${ENV}
      - SECRET_KEY=${SECRET_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - DATABASE_URL=mysql+pymysql://myadmin_user:myadmin_password@db:3306/myadmin_db
      #- SSH_PRIVATE_KEY_PASSPHRASE=${SSH_PRIVATE_KEY_PASSPHRASE}
      # The Python application will ALWAYS read these fixed paths, regardless of the host user!
      #- SSH_PRIVATE_KEY_PATH=/app/secrets/id_rsa
      #- SSH_KNOWN_HOSTS_PATH=/app/secrets/known_hosts
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_dev_data: