apiVersion: v1
kind: ServiceAccount
metadata:
  name: gar-token-refresher-sa
  namespace: myadmin-dev
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gar-token-refresher-role
  namespace: myadmin-dev
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["create", "get", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gar-token-refresher-binding
  namespace: myadmin-dev
subjects:
- kind: ServiceAccount
  name: gar-token-refresher-sa
  namespace: myadmin-dev
roleRef:
  kind: Role
  name: gar-token-refresher-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: gar-token-refresher
  namespace: myadmin-dev
spec:
  schedule: "*/30 * * * *" # S'exécute automatiquement toutes les 30 minutes
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: gar-token-refresher-sa
          restartPolicy: OnFailure
          containers:
          - name: gcloud-kubectl
            # Cette image officielle Google contient à la fois gcloud et kubectl sous Alpine
            image: google/cloud-sdk:alpine
            command:
            - /bin/bash
            - -c
            - |
              echo "=== 1. Récupération du jeton d'accès GCP via l'identité de la VM ==="
              GCP_TOKEN=$(gcloud auth print-access-token)
              
              echo "=== 2. Recréation dynamique du secret Kubernetes ==="
              kubectl create secret docker-registry gar-credentials \
                --docker-server=us-west1-docker.pkg.dev \
                --docker-username=oauth2accesstoken \
                --docker-password="${GCP_TOKEN}" \
                --dry-run=client -o yaml | kubectl apply -f -
              
              echo "=== Rafraîchissement du token gar terminé avec succès ==="