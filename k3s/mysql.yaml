apiVersion: v1
kind: Service
metadata:
  name: myadmin-db-service
  namespace: myadmin-dev
  labels:
    app.kubernetes.io/name: myadmin-db
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: myadmin
spec:
  type: ClusterIP
  clusterIP: None # Service de type Headless pour permettre l'accès direct aux pods du StatefulSet
  ports:
  - port: 3306
    name: mysql
  selector:
    app.kubernetes.io/name: myadmin-db
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: myadmin-db
  namespace: myadmin-dev
  labels:
    app.kubernetes.io/name: myadmin-db
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: myadmin
spec:
  serviceName: "myadmin-db-service"
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: myadmin-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: myadmin-db
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: myadmin
    spec:
      nodeSelector:
        # Force l'exécution sur le worker 1.
        kubernetes.io/hostname: "myadmin-k3s-worker"
      containers:
      - name: mysql
        image: mysql:8.0.46 # Version officielle de MySQL 8.0
        command: ["mysqld", "--host-cache-size=0"] # Désactive le cache d'hôtes pour éviter les problèmes de résolution DNS dans Kubernetes
        ports:
        - containerPort: 3306
          name: mysql
        env:
        - name: MYSQL_DATABASE
          valueFrom:
            secretKeyRef:
              name: mysql-production-secrets
              key: mysql-database
        - name: MYSQL_USER
          valueFrom:
            secretKeyRef:
              name: mysql-production-secrets
              key: mysql-user
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-production-secrets
              key: mysql-root-password
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-production-secrets
              key: mysql-password

        volumeMounts:
        - name: mysql-data
          mountPath: /var/lib/mysql
  volumeClaimTemplates:
  - metadata:
      name: mysql-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 2Gi # Taille du disque persistant alloué
