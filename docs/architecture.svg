<svg xmlns="[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)" viewBox="0 0 1000 680" width="100%" height="100%">
  <defs>
    <linearGradient id="gcpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8f0fe"/>
      <stop offset="100%" stop-color="#d2e3fc"/>
    </linearGradient>
    <linearGradient id="k3sGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e6f4ea"/>
      <stop offset="100%" stop-color="#ceead6"/>
    </linearGradient>
    <linearGradient id="jksGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef7e0"/>
      <stop offset="100%" stop-color="#feebd0"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f3f4"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#5f6368"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#1a73e8"/>
    </marker>
  </defs>

  <style>
    .headline { font-family: 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: 700; fill: #202124; }
    .subline { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; font-style: italic; fill: #5f6368; }
    .lbl { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; font-weight: 600; fill: #202124; text-anchor: middle; }
    .lbl-sm { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #3c4043; text-anchor: middle; }
    .flow-txt { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; font-weight: 600; fill: #1a73e8; text-anchor: middle; }
    
    /* Flow Animations */
    .wire { stroke: #7f878a; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .active-wire { stroke: #1a73e8; stroke-width: 2.5; fill: none; stroke-dasharray: 8, 5; animation: dash 25s linear infinite; marker-end: url(#arrowBlue); }
    @keyframes dash { to { stroke-dashoffset: -1000; } }
  </style>

  <rect width="100%" height="100%" fill="#ffffff" rx="8"/>

  <g transform="translate(30, 80)">
    <rect width="160" height="80" rx="6" fill="url(#boxGrad)" stroke="#bdc1c6" stroke-width="1.5"/>
    <text x="80" y="35" class="lbl">Developer Workstation</text>
    <text x="80" y="55" class="lbl-sm">Git Commit / Push</text>
  </g>

  <g transform="translate(30, 240)">
    <rect width="160" height="110" rx="6" fill="url(#boxGrad)" stroke="#bdc1c6" stroke-width="1.5"/>
    <text x="80" y="30" class="lbl">GitHub Platform</text>
    <line x1="15" y1="45" x2="145" y2="45" stroke="#dee2e6" stroke-width="1"/>
    <text x="80" y="65" class="lbl-sm">1. MyAdmin (App Source)</text>
    <text x="80" y="85" class="lbl-sm">2. IaaS-MyAdmin (Infra)</text>
  </g>

  <g transform="translate(260, 40)">
    <rect width="710" height="600" rx="12" fill="url(#gcpGrad)" stroke="#4285f4" stroke-width="2"/>
    <text x="30" y="35" class="headline">Google Cloud Platform (GCP)</text>
    <text x="30" y="55" class="subline">Isolated VPC Network Infrastructure</text>

    <g transform="translate(30, 110)">
      <rect width="160" height="490" rx="8" fill="#e8eaed" stroke="#7f878a" stroke-width="1.5" stroke-dasharray="4,4"/>
      <text x="80" y="35" class="lbl">Identity-Aware Proxy</text>
      <text x="80" y="55" class="lbl-sm">(IAP Secure Boundary)</text>
      <rect x="15" y="210" width="130" height="70" rx="4" fill="#ffffff" stroke="#9aa0a6" stroke-width="1"/>
      <text x="80" y="240" class="lbl-sm">Encrypted HTTPS</text>
      <text x="80" y="255" class="lbl-sm">Port 443 Tunnel</text>
    </g>

    <g transform="translate(230, 110)">
      <rect width="180" height="170" rx="8" fill="url(#jksGrad)" stroke="#fbbc05" stroke-width="1.5"/>
      <text x="90" y="30" class="lbl">Jenkins Pipeline Node</text>
      <text x="90" y="48" class="lbl-sm">(Docker-in-Docker Context)</text>
      
      <rect x="15" y="70" width="150" height="35" rx="4" fill="#ffffff" stroke="#fecb43" stroke-width="1"/>
      <text x="90" y="92" class="lbl-sm">Manifest Linter (Yamllint)</text>
      
      <rect x="15" y="115" width="150" height="40" rx="4" fill="#ffffff" stroke="#fecb43" stroke-width="1"/>
      <text x="90" y="132" class="lbl-sm">Image Compiler</text>
      <text x="90" y="147" class="lbl-sm">(Short-SHA Tagging)</text>
    </g>

    <g transform="translate(450, 110)">
      <rect width="230" height="85" rx="8" fill="#ffffff" stroke="#4285f4" stroke-width="1.5"/>
      <text x="115" y="30" class="lbl">Artifact Registry (GAR)</text>
      <text x="115" y="50" class="lbl-sm">Repository: myadmin-repo</text>
      <text x="115" y="68" class="lbl-sm" style="font-size:10px; fill:#5f6368;">us-west1-docker.pkg.dev</text>
    </g>

    <g transform="translate(230, 315)">
      <rect width="450" height="260" rx="8" fill="url(#k3sGrad)" stroke="#34a853" stroke-width="2"/>
      <text x="225" y="30" class="lbl" style="font-size:15px;">K3s Container Orchestration Cluster</text>
      
      <g transform="translate(20, 55)">
        <rect width="160" height="180" rx="6" fill="#ffffff" stroke="#1e8e3e" stroke-width="1.5"/>
        <text x="80" y="25" class="lbl">Master Node</text>
        <text x="80" y="42" class="lbl-sm">Control Plane Engine</text>
        
        <rect x="10" y="75" width="140" height="85" rx="4" fill="#f1f8e9" stroke="#7cb342" stroke-width="1"/>
        <text x="80" y="95" class="lbl-sm" style="font-weight:600;">Token Refresher</text>
        <text x="80" y="115" class="lbl-sm">(CronJob Loop)</text>
        <text x="80" y="140" class="lbl-sm" style="font-size:10px; fill:#5f6368;">Rotates Every 30m</text>
      </g>

      <g transform="translate(210, 55)">
        <rect width="220" height="180" rx="6" fill="#ffffff" stroke="#1e8e3e" stroke-width="1.5"/>
        <text x="110" y="25" class="lbl">Compute Worker Nodes</text>
        
        <rect x="15" y="45" width="190" height="65" rx="4" fill="#e8f5e9" stroke="#81c784" stroke-width="1"/>
        <text x="110" y="65" class="lbl-sm" style="font-weight:600;">myadmin-api Pods</text>
        <text x="110" y="82" class="lbl-sm">Footprint footprint: 3-10 Replicas</text>
        <text x="110" y="98" class="lbl-sm" style="font-size:9px; fill:#2e7d32;">Managed via HPA / VPA</text>

        <rect x="15" y="120" width="190" height="45" rx="4" fill="#ede7f6" stroke="#b39ddb" stroke-width="1"/>
        <text x="110" y="140" class="lbl-sm" style="font-weight:600;">myadmin-db Tier</text>
        <text x="110" y="155" class="lbl-sm">(StatefulSet Instance)</text>
      </g>
    </g>
  </g>

  <path d="M 110,160 L 110,232" class="wire"/>
  <text x="110" y="200" class="lbl-sm">Code Push</text>

  <path d="M 190,295 C 220,295 220,165 480,165" class="active-wire"/>
  <text x="295" y="150" class="flow-txt">1. Webhook Notification</text>

  <path d="M 640,195 L 640,220 C 640,220 640,145 700,145" class="active-wire"/>
  <text x="610" y="210" class="flow-txt">2. Push Images</text>

  <path d="M 420,280 C 370,330 310,330 310,360" class="active-wire"/>
  <text x="320" y="315" class="flow-txt">3. SSH Over IAP</text>

  <path d="M 340,445 C 340,410 740,410 740,205" class="wire" stroke-dasharray="4,4"/>
  <text x="560" y="395" class="lbl-sm" style="fill:#2e7d32;">Auth Token Sync</text>
</svg>